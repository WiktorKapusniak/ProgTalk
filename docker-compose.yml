version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: progtalk-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: progtalk
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: progtalk-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: progtalk-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host

volumes:
  mongo-data:
