services:
  mongo:
    image: mongo:6
    container_name: mongo
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: backend
    ports:
      - "443:5000"
    volumes:
      - ./nginx/certs:/app/certs:ro
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

  # nginx:
